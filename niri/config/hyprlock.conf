general {
  hide_cursor = true
  ignore_empty_input = true
}

animations {
  enabled = true
  fade_in {
    duration = 200
    bezier = easeOutQuint
  }
  fade_out {
    duration = 200
    bezier = easeOutQuint
  }
}

background {
    path = screenshot
    blur_passes = 1
}

input-field {
    size = 20%, 5%
    outline_thickness = 3
    inner_color = rgba(0, 0, 0, 0.0) # no fill

    outer_color = rgba(33ccffee) rgba(00ff99ee) 45deg
    check_color=rgba(00ff99ee) rgba(ff6633ee) 120deg
    fail_color=rgba(ff6633ee) rgba(ff0066ee) 40deg

    position = 0, -20
    halign = center
    valign = center
}
  
